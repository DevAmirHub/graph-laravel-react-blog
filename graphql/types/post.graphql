type Post {
    id: ID!
    title: String!
    slug: String!
    excerpt: String
    content: String
    cover_image: String
    status: String!
    views: Int!

    author: User! @belongsTo(relation: "user")
    category: Category @belongsTo
    comments: [Comment!]! @hasMany
    tags: [Tag!]! @belongsToMany

    created_at: DateTime!
    updated_at: DateTime!
}