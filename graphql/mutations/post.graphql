extend type Mutation {
    createPost(
        title: String! @rules(apply: ["required", "string", "min:5", "max:255"])
        slug: String! @rules(apply: ["required", "string", "unique:posts,slug"])
        excerpt: String
        content: String! @rules(apply: ["required", "string", "min:20"])
        cover_image: String
        status: String! @rules(apply: ["required", "in:draft,published,archived"])
        category_id: ID! @rules(apply: ["required", "exists:categories,id"])
        tags: PostTagsRelation
    ): Post! @guard @create @inject(context: "user.id", name: "user_id")

    updatePost(
        id: ID! @whereKey @rules(apply: ["exists:posts,id"])
        title: String @rules(apply: ["string", "min:5", "max:255"])
        slug: String @rules(apply: ["unique:posts,slug,{id}"])
        excerpt: String
        content: String @rules(apply: ["string", "min:20"])
        cover_image: String
        status: String @rules(apply: ["in:draft,published,archived"])
        category_id: ID @rules(apply: ["exists:categories,id"])
        tags: PostTagsRelation
    ): Post! @guard @update

    deletePost(
        id: ID! @whereKey @rules(apply: ["exists:posts,id"])
    ): Post @guard @delete
}
